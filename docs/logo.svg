<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 320" width="720" height="320">
  <defs>
    <!-- Dark radial glow behind the sigil -->
    <radialGradient id="bg-glow" cx="50%" cy="50%" r="55%">
      <stop offset="0%" stop-color="#1a0a2e"/>
      <stop offset="60%" stop-color="#0d0d0d"/>
      <stop offset="100%" stop-color="#000000"/>
    </radialGradient>

    <!-- Molten amber for the Zcash Z sigil -->
    <linearGradient id="sigil-fire" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ffd700"/>
      <stop offset="40%" stop-color="#f4a020"/>
      <stop offset="100%" stop-color="#a0440a"/>
    </linearGradient>

    <!-- Ghostly eye glow -->
    <radialGradient id="eye-glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ffd700" stop-opacity="0.9"/>
      <stop offset="60%" stop-color="#f4a020" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#a0440a" stop-opacity="0"/>
    </radialGradient>

    <!-- Text gradient - corroded silver -->
    <linearGradient id="text-metal" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#c0c0c0"/>
      <stop offset="30%" stop-color="#e8e8e8"/>
      <stop offset="50%" stop-color="#ffffff"/>
      <stop offset="70%" stop-color="#c0c0c0"/>
      <stop offset="100%" stop-color="#808080"/>
    </linearGradient>

    <!-- Subtitle gradient -->
    <linearGradient id="sub-metal" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#666"/>
      <stop offset="50%" stop-color="#999"/>
      <stop offset="100%" stop-color="#666"/>
    </linearGradient>

    <!-- Outer ring glow filter -->
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Heavy outer glow for the eye -->
    <filter id="eye-filter" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Text shadow -->
    <filter id="text-shadow" x="-5%" y="-5%" width="110%" height="120%">
      <feDropShadow dx="0" dy="2" stdDeviation="2" flood-color="#000" flood-opacity="0.8"/>
    </filter>

    <!-- Subtle noise texture -->
    <filter id="noise">
      <feTurbulence type="fractalNoise" baseFrequency="0.9" numOctaves="4" stitchTiles="stitch" result="noise"/>
      <feColorMatrix type="saturate" values="0" in="noise" result="grey-noise"/>
      <feBlend in="SourceGraphic" in2="grey-noise" mode="multiply" result="textured"/>
      <feComposite in="textured" in2="SourceGraphic" operator="in"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="720" height="320" fill="url(#bg-glow)"/>

  <!-- Faint ritual circle behind the sigil -->
  <g transform="translate(140, 160)" opacity="0.15">
    <circle cx="0" cy="0" r="110" fill="none" stroke="#f4a020" stroke-width="0.5"/>
    <circle cx="0" cy="0" r="100" fill="none" stroke="#f4a020" stroke-width="0.3"/>
    <!-- Arcane tick marks around the circle -->
    <g stroke="#f4a020" stroke-width="0.5" opacity="0.6">
      <line x1="0" y1="-105" x2="0" y2="-95" transform="rotate(0)"/>
      <line x1="0" y1="-105" x2="0" y2="-95" transform="rotate(30)"/>
      <line x1="0" y1="-105" x2="0" y2="-95" transform="rotate(60)"/>
      <line x1="0" y1="-105" x2="0" y2="-95" transform="rotate(90)"/>
      <line x1="0" y1="-105" x2="0" y2="-95" transform="rotate(120)"/>
      <line x1="0" y1="-105" x2="0" y2="-95" transform="rotate(150)"/>
      <line x1="0" y1="-105" x2="0" y2="-95" transform="rotate(180)"/>
      <line x1="0" y1="-105" x2="0" y2="-95" transform="rotate(210)"/>
      <line x1="0" y1="-105" x2="0" y2="-95" transform="rotate(240)"/>
      <line x1="0" y1="-105" x2="0" y2="-95" transform="rotate(270)"/>
      <line x1="0" y1="-105" x2="0" y2="-95" transform="rotate(300)"/>
      <line x1="0" y1="-105" x2="0" y2="-95" transform="rotate(330)"/>
    </g>
  </g>

  <!-- === CENTRAL SIGIL: All-seeing eye with Zcash Z === -->
  <g transform="translate(140, 160)">

    <!-- Outer hexagonal shield frame -->
    <polygon
      points="0,-88 76,-44 76,44 0,88 -76,44 -76,-44"
      fill="none"
      stroke="#f4a020"
      stroke-width="1.5"
      opacity="0.3"
      filter="url(#glow)"
    />

    <!-- Eye shape - almond/mandorla -->
    <g filter="url(#eye-filter)">
      <!-- Ambient glow -->
      <ellipse cx="0" cy="0" rx="70" ry="42" fill="url(#eye-glow)" opacity="0.5"/>

      <!-- Upper eyelid -->
      <path d="M -65,0 Q -30,-52 0,-55 Q 30,-52 65,0" fill="none" stroke="url(#sigil-fire)" stroke-width="2.5" stroke-linecap="round"/>
      <!-- Lower eyelid -->
      <path d="M -65,0 Q -30,52 0,55 Q 30,52 65,0" fill="none" stroke="url(#sigil-fire)" stroke-width="2.5" stroke-linecap="round"/>

      <!-- Iris ring -->
      <circle cx="0" cy="0" r="28" fill="none" stroke="#f4a020" stroke-width="1.5" opacity="0.6"/>
      <circle cx="0" cy="0" r="22" fill="#1a0a2e" stroke="#ffd700" stroke-width="0.8" opacity="0.8"/>

      <!-- Zcash Z as the pupil / inner sigil -->
      <g transform="scale(0.9)">
        <!-- Z constructed from angular slashes -->
        <path
          d="M -13,-14 L 13,-14 L -10,12 L 13,12"
          fill="none"
          stroke="#ffd700"
          stroke-width="3.5"
          stroke-linecap="square"
          stroke-linejoin="miter"
        />
        <!-- Horizontal bars on Z -->
        <line x1="-13" y1="-14" x2="-16" y2="-14" stroke="#ffd700" stroke-width="2"/>
        <line x1="13" y1="12" x2="16" y2="12" stroke="#ffd700" stroke-width="2"/>
      </g>

      <!-- Pupil glow dot -->
      <circle cx="0" cy="0" r="3" fill="#ffd700" opacity="0.7"/>
    </g>

    <!-- Decorative rays emanating from the eye -->
    <g stroke="#f4a020" stroke-width="0.5" opacity="0.2">
      <line x1="0" y1="-60" x2="0" y2="-80"/>
      <line x1="42" y1="-42" x2="57" y2="-57"/>
      <line x1="60" y1="0" x2="80" y2="0"/>
      <line x1="42" y1="42" x2="57" y2="57"/>
      <line x1="0" y1="60" x2="0" y2="80"/>
      <line x1="-42" y1="42" x2="-57" y2="57"/>
      <line x1="-60" y1="0" x2="-80" y2="0"/>
      <line x1="-42" y1="-42" x2="-57" y2="-57"/>
    </g>

    <!-- Small ward symbols at cardinal points -->
    <g fill="none" stroke="#f4a020" stroke-width="0.8" opacity="0.25">
      <!-- Top -->
      <path d="M -4,-92 L 0,-100 L 4,-92" />
      <!-- Bottom -->
      <path d="M -4,92 L 0,100 L 4,92" />
      <!-- Left -->
      <path d="M -92,-4 L -100,0 L -92,4" />
      <!-- Right -->
      <path d="M 92,-4 L 100,0 L 92,4" />
    </g>
  </g>

  <!-- === TITLE TEXT: SIGIL SENTINEL === -->
  <!-- Heavy metal style blackletter-inspired angular text -->
  <g filter="url(#text-shadow)">
    <text
      x="430"
      y="132"
      font-family="'Georgia', 'Times New Roman', serif"
      font-size="62"
      font-weight="bold"
      letter-spacing="8"
      fill="url(#text-metal)"
      text-anchor="middle"
      filter="url(#noise)"
    >SIGIL</text>
    <text
      x="430"
      y="196"
      font-family="'Georgia', 'Times New Roman', serif"
      font-size="52"
      font-weight="bold"
      letter-spacing="12"
      fill="url(#text-metal)"
      text-anchor="middle"
      filter="url(#noise)"
    >SENTINEL</text>
  </g>

  <!-- Horizontal rule slashes flanking the subtitle -->
  <line x1="295" y1="218" x2="390" y2="218" stroke="#f4a020" stroke-width="0.5" opacity="0.4"/>
  <line x1="470" y1="218" x2="565" y2="218" stroke="#f4a020" stroke-width="0.5" opacity="0.4"/>
  <!-- Small diamond separator -->
  <polygon points="430,218 434,214 438,218 434,222" fill="#f4a020" opacity="0.3"/>

  <!-- Subtitle -->
  <text
    x="430"
    y="248"
    font-family="'Courier New', monospace"
    font-size="13"
    letter-spacing="5"
    fill="url(#sub-metal)"
    text-anchor="middle"
  >ZCASH BALANCE SENTINEL</text>

  <!-- Bottom decorative line -->
  <line x1="60" y1="290" x2="660" y2="290" stroke="#f4a020" stroke-width="0.3" opacity="0.15"/>
</svg>
